# Partial enforcement: fixture-parentheses and raises-require-match-for enforce
# pytest conventions compatible with governance-descriptive test naming.
#
# RUFF-LIMITATION: Ruff cannot enforce test function naming patterns.
#
# CI-ALTERNATIVE: grep -rn "^def test_" tests/ | grep -vE "test_(pass[12]|review_cli|audit|lens|anchor|dpia|strand|gate)" && echo "WARNING: test name may not encode governance behavior" || true

[lint.flake8-pytest-style]
fixture-parentheses = false
raises-require-match-for = ["Exception", "RuntimeError", "ValueError", "SystemExit"]
