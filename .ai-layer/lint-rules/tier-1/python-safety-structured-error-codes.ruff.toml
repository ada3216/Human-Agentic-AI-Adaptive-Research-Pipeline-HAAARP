# Partial enforcement: max-string-length = 0 configures flake8-errmsg to flag
# all bare string literals in raise statements (EM101/EM102/EM103).
# EM rules are activated via extend-select in scripts/lint-adapters/python.sh.
#
# RUFF-LIMITATION: Ruff cannot verify error values match codes in docs/error_codes.md.
#
# CI-ALTERNATIVE: grep -rn 'raise.*Error(' src/ | grep -vE 'ERR_[A-Z_]+' \
#   && echo "VIOLATION: raise without ERR_ code" && exit 1 || true

[lint.flake8-errmsg]
max-string-length = 0
